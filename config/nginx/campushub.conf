upstream campushub_app {
    server unix:/tmp/campushub_gunicorn.sock;
}

server {
    listen 80;
    server_name my-cham-a.app www.my-cham-a.app;

    client_max_body_size 50M;

    location /static/ {
        alias /home/kipruto/Desktop/CampusHub/staticfiles/;
        access_log off;
        expires 30d;
    }

    location /media/ {
        alias /home/kipruto/Desktop/CampusHub/media/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://campushub_app;
    }
}
