<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusHub Offline</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f7f7fb; color: #111827; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    h1 { margin: 0 0 12px; font-size: 26px; color: #4F46E5; }
    p { margin: 8px 0; line-height: 1.5; }
    .pill { display: inline-block; background: #EEF2FF; color: #4338CA; padding: 6px 10px; border-radius: 999px; font-size: 12px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Offline Mode</h1>
    <p>You’re offline, but you can keep browsing cached pages and recent content.</p>
    <p class="pill">We’ll sync changes when you’re back online.</p>
  </div>
</body>
</html>
