services:
  - type: web
    name: campushub-api
    env: python
    buildCommand: |
      mkdir -p /tmp && \
      pip install -r requirements.txt && \
      python manage.py migrate --noinput && \
      if [ "$RESET_REFERENCE_DATA" = "true" ]; then python manage.py clear_all_data; fi && \
      python manage.py seed_all_data && \
      python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        value: sqlite:////tmp/campushub.sqlite3
      - key: FORCE_SQLITE
        value: "True"
      - key: SQLITE_PATH
        value: /tmp/campushub.sqlite3
      - key: AUTO_MIGRATE_ON_STARTUP
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: RESET_REFERENCE_DATA
        value: "false"
      - key: FRONTEND_BASE_URL
        value: https://my-cham-a.app
      - key: FRONTEND_URL
        value: https://my-cham-a.app
      - key: RESOURCE_SHARE_BASE_URL
        value: https://my-cham-a.app
