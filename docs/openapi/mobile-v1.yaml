components:
  schemas:
    ActivityStats:
      type: object
      description: Serializer for activity statistics.
      properties:
        total_activities:
          type: integer
        viewed_count:
          type: integer
        downloaded_count:
          type: integer
        bookmarked_count:
          type: integer
        opened_files_count:
          type: integer
      required:
      - bookmarked_count
      - downloaded_count
      - opened_files_count
      - total_activities
      - viewed_count
    ActivityTypeEnum:
      enum:
      - viewed_resource
      - opened_personal_file
      - downloaded_resource
      - downloaded_personal_file
      - bookmarked_resource
      - created_resource
      - updated_resource
      - commented
      - rated
      type: string
      description: |-
        * `viewed_resource` - Viewed Resource
        * `opened_personal_file` - Opened Personal File
        * `downloaded_resource` - Downloaded Resource
        * `downloaded_personal_file` - Downloaded Personal File
        * `bookmarked_resource` - Bookmarked Resource
        * `created_resource` - Created Resource
        * `updated_resource` - Updated Resource
        * `commented` - Commented
        * `rated` - Rated
