  /api/recommendations/collaborative/:
    get:
      operationId: api_recommendations_collaborative_list
      description: |-
        Get collaborative filtering recommendations.

        This algorithm recommends resources that similar students have downloaded or liked.
        Similarity is based on:
        - Same course (3.0 weight)
        - Same year of study (2.5 weight)
        - Same department (2.0 weight)
        - Same faculty (1.5 weight)

        Process:
        1. Get current user's academic profile
        2. Find similar users (same course/year)
        3. Get resources downloaded/favorited by similar users
        4. Rank by number of similar users who interacted + similarity score
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - api
      security:
      - BearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRecommendedResourceList'
          description: ''
