events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # File uploads
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/json application/javascript;

    # Upstream Django application
    upstream camphub_web {
        server web:8000;
    }

    upstream camphub_ws {
        server daphne:8001;
    }

    server {
        listen 80;
        server_name _;

        # Media files
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # PWA static files
        location /app/ {
            alias /app/mobile/web-build/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri $uri/ /app/index.html;
        }

        # Download page
        location = /install {
            alias /app/mobile/downloads.html;
            expires -1;
            add_header Cache-Control "no-store";
        }

        # APK download
        location /download/ {
            alias /app/mobile/android/app/build/outputs/apk/release/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Content-Disposition "attachment";
        }

        # Static files
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Django application
        location / {
            proxy_pass http://camphub_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_redirect off;
            proxy_buffering off;
        }

        # WebSocket traffic must hit Daphne, not Gunicorn.
        location /ws/ {
            proxy_pass http://camphub_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }
    }
}
